name: Test & Publish

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to push git tags
      id-token: write # needed for npm OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by semantic-version

      - name: Generate Semantic Version
        id: semantic_version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: 'v'
          major_pattern: '/!:|BREAKING CHANGE:/'
          minor_pattern: '/feat/'
          bump_each_commit_patch_pattern: '/fix|bugfix|chore|refactor|style|docs|test|perf/'
          version_format: '${major}.${minor}.${patch}'
          enable_prerelease_mode: false
          bump_each_commit: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Set version in package.json
        run: |
          VERSION="${{ steps.semantic_version.outputs.version }}"
          echo "Publishing version: $VERSION"
          npm pkg set version="$VERSION"

      - name: Pack (dry run — verify bundle)
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create and push git tag
        run: |
          VERSION="${{ steps.semantic_version.outputs.version }}"

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists. Skipping."
            exit 0
          fi

          git config user.name "enmanuelmag"
          git config user.email "enmanuelmag@cardor.dev"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Log publish info
        run: |
          echo "🚀 Published @cardor/agent-harness-kit@${{ steps.semantic_version.outputs.version }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
